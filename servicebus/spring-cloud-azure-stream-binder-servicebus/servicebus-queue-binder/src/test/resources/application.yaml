spring:
  cloud:
    azure:
      servicebus:
        namespace:
    function:
      definition: consume;supply
    stream:
      bindings:
        consume-in-0:
          destination:
        supply-out-0:
          destination:
      servicebus:
        bindings:
          consume-in-0:
            consumer:
              auto-complete: false
          supply-out-0:
            producer:
              entity-type: queue
      poller:
        fixed-delay: 1000
        initial-delay: 0
